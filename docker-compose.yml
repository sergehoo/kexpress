name: kexpress

services:
  kexpress-db:
    image: postgis/postgis:16-3.5
    container_name: kexpress-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kexpress}
      POSTGRES_USER: ${POSTGRES_USER:-kexpress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
    volumes:
      - kexpress_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kexpress} -d ${POSTGRES_DB:-kexpress}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      kexpress-internal:
        aliases:
          - kexpress-db
          - db

  kexpress-redis:
    image: redis:7-alpine
    container_name: kexpress-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - kexpress_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      kexpress-internal:
        aliases:
          - kexpress-redis
          - redis

  # === Routage OSRM auto-hébergé (open source) — pipeline auto-amorçant ===
  # Aucune étape manuelle : au 1er démarrage la stack télécharge l'extrait OSM
  # puis prépare le graphe MLD (extract → partition → customize). Le résultat est
  # mis en cache dans le volume nommé `kexpress_osrm` (PAS ./osrm-data), donc les
  # démarrages suivants sont instantanés. Backend → OSRM_URL=http://kexpress-osrm:5000.
  #
  #   1) fetch   : télécharge l'extrait .osm.pbf (+ vérif md5) — image alpine (curl)
  #   2) prepare : osrm-extract/partition/customize (idempotent + auto-nettoyant)
  #   3) osrm    : osrm-routed --algorithm mld (sert l'API HTTP)
  #
  # RAM : la préparation de l'extrait Côte d'Ivoire (~85 Mo) demande ~2 Go ; prévoir
  #   ≥2-4 Go de RAM ou un swap sur l'hôte, sinon osrm-customize peut être OOM-killed.
  # RAFRAÎCHIR LA CARTE (nouveau réseau routier OSM) — les sentinelles figent les
  #   données ; pour forcer la mise à jour :
  #     docker compose run --rm --entrypoint sh kexpress-osrm-prepare -c \
  #       'rm -f /data/.pbf.ok /data/.osrm.ready'
  #     docker compose up -d --force-recreate kexpress-osrm-fetch kexpress-osrm-prepare kexpress-osrm
  # Image épinglée (v5.26.0) : un graphe préparé n'est PAS compatible entre versions.

  # 1) Téléchargement de l'extrait OSM (l'image osrm-backend n'a pas de client HTTP).
  kexpress-osrm-fetch:
    image: alpine:3.20
    restart: "no"
    environment:
      OSRM_REGION_URL: ${OSRM_REGION_URL:-https://download.geofabrik.de/africa/ivory-coast-latest.osm.pbf}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        cd /data
        if [ -f cote-divoire-latest.osm.pbf ] && [ -f .pbf.ok ]; then
          echo "Extrait OSM déjà présent et complet — téléchargement ignoré."
          exit 0
        fi
        rm -f cote-divoire-latest.osm.pbf.part
        apk add --no-cache ca-certificates curl >/dev/null
        echo "Téléchargement de l'extrait OSM : $$OSRM_REGION_URL"
        curl -fSL --retry 5 --retry-delay 5 "$$OSRM_REGION_URL" -o cote-divoire-latest.osm.pbf.part
        # Intégrité : md5 Geofabrik si disponible (évite qu'un fichier tronqué-mais-200
        # empoisonne le cache à vie), sinon repli sur un contrôle de taille minimal.
        if curl -fsSL --retry 3 "$$OSRM_REGION_URL.md5" -o sum.md5 2>/dev/null; then
          exp=$$(cut -d' ' -f1 sum.md5)
          act=$$(md5sum cote-divoire-latest.osm.pbf.part | cut -d' ' -f1)
          if [ "$$exp" != "$$act" ]; then echo "Échec md5 ($$exp != $$act) — abandon."; exit 1; fi
          echo "md5 vérifié."
        elif [ "$$(wc -c < cote-divoire-latest.osm.pbf.part)" -lt 1000000 ]; then
          echo "Téléchargement suspect (trop petit) — abandon."; exit 1
        fi
        mv cote-divoire-latest.osm.pbf.part cote-divoire-latest.osm.pbf
        touch .pbf.ok
        echo "Extrait OSM prêt."
    volumes:
      - kexpress_osrm:/data
    networks:
      - kexpress-internal

  # 2) Préparation du graphe MLD (idempotente + auto-nettoyante).
  kexpress-osrm-prepare:
    image: osrm/osrm-backend@sha256:af5d4a83fb90086a43b1ae2ca22872e6768766ad5fcbb07a29ff90ec644ee409  # = latest (v5.26.0), épinglé par digest immuable
    restart: "no"
    depends_on:
      kexpress-osrm-fetch:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        cd /data
        if [ -f .osrm.ready ]; then
          echo "Graphe OSRM déjà préparé — préparation ignorée."
          exit 0
        fi
        # Repart d'un état propre : purge tout graphe partiel laissé par une
        # préparation interrompue (OOM/kill mid-customize) pour ne jamais empiler
        # un nouveau graphe sur des fichiers corrompus.
        rm -f cote-divoire-latest.osrm*
        echo "Mémoire disponible :"; head -3 /proc/meminfo || true
        echo "osrm-extract…"
        osrm-extract -p /opt/car.lua cote-divoire-latest.osm.pbf
        echo "osrm-partition…"
        osrm-partition cote-divoire-latest.osrm
        echo "osrm-customize…"
        osrm-customize cote-divoire-latest.osrm
        # Sentinelle posée seulement si l'artefact MLD final existe réellement
        # (≠ simple touch) — garantit qu'un graphe incomplet n'est jamais « prêt ».
        test -s cote-divoire-latest.osrm.mldgr
        touch .osrm.ready
        echo "Graphe MLD prêt."
    volumes:
      - kexpress_osrm:/data
    networks:
      - kexpress-internal

  # 3) Serveur de routage (démarre seulement quand le graphe est prêt).
  kexpress-osrm:
    image: osrm/osrm-backend@sha256:af5d4a83fb90086a43b1ae2ca22872e6768766ad5fcbb07a29ff90ec644ee409  # = latest (v5.26.0), épinglé par digest immuable
    container_name: kexpress-osrm
    restart: unless-stopped
    depends_on:
      kexpress-osrm-prepare:
        condition: service_completed_successfully
    # --max-table-size : plafond du nombre de coordonnées pour /table (affectation au
    # plus proche). Défaut OSRM = 100 → bloquerait au-delà de ~99 véhicules localisés.
    command: ["osrm-routed", "--algorithm", "mld", "--max-table-size", "5000", "/data/cote-divoire-latest.osrm"]
    volumes:
      - kexpress_osrm:/data
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5000' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      kexpress-internal:
        aliases:
          - kexpress-osrm
          - osrm

  kexpress-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kexpress-backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requis}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS requis}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS requis}

      DATABASE_URL: postgres://${POSTGRES_USER:-kexpress}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}@kexpress-db:5432/${POSTGRES_DB:-kexpress}
      REDIS_URL: redis://kexpress-redis:6379/0

      OIDC_ENABLED: ${OIDC_ENABLED:-False}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-kexpress-web}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_DEFAULT_ROLE: ${OIDC_DEFAULT_ROLE:-requester}
      LOCAL_LOGIN_ENABLED: ${LOCAL_LOGIN_ENABLED:-True}

      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_ADMIN_EMAIL: ${VAPID_ADMIN_EMAIL:-admin@example.com}

      NOTIFY_EMAIL_ENABLED: ${NOTIFY_EMAIL_ENABLED:-False}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@kaydan-express.ci}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}

      # K-BOT IA — moteur LLM par défaut : DeepSeek (compatible OpenAI). Définir
      # DEEPSEEK_API_KEY pour activer. Anthropic (Claude) reste possible via
      # KBOT_PROVIDER=anthropic + ANTHROPIC_API_KEY. Sinon : moteur heuristique.
      KBOT_PROVIDER: ${KBOT_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      KBOT_MODEL: ${KBOT_MODEL:-deepseek-chat}
      KBOT_BASE_URL: ${KBOT_BASE_URL:-https://api.deepseek.com}
      KBOT_MAX_TOKENS: ${KBOT_MAX_TOKENS:-600}

      OSRM_URL: ${OSRM_URL:-http://kexpress-osrm:5000}
      NOMINATIM_URL: ${NOMINATIM_URL:-https://nominatim.openstreetmap.org}
      MAP_COST_PER_KM: ${MAP_COST_PER_KM:-350.0}
      FUEL_PRICE_SOURCE_URL: ${FUEL_PRICE_SOURCE_URL:-}
      FUEL_PRICE_SUPER: ${FUEL_PRICE_SUPER:-875}
      FUEL_PRICE_GASOIL: ${FUEL_PRICE_GASOIL:-655}
      REVISION_ALERT_PCTS: ${REVISION_ALERT_PCTS:-20,10,5}

      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-2592000}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-True}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-True}
      CONN_MAX_AGE: ${CONN_MAX_AGE:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}

      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
      SEED_DEMO: ${SEED_DEMO:-false}
    depends_on:
      kexpress-db:
        condition: service_healthy
      kexpress-redis:
        condition: service_healthy
    volumes:
      - kexpress_media:/app/media
      - kexpress_static:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - kexpress-internal
      - dokploy-network

  kexpress-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kexpress-worker
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency", "${CELERY_CONCURRENCY:-4}"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requis}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS requis}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS requis}
      DATABASE_URL: postgres://${POSTGRES_USER:-kexpress}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}@kexpress-db:5432/${POSTGRES_DB:-kexpress}
      REDIS_URL: redis://kexpress-redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      kexpress-db:
        condition: service_healthy
      kexpress-redis:
        condition: service_healthy
    volumes:
      - kexpress_media:/app/media
    networks:
      - kexpress-internal

  kexpress-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kexpress-beat
    restart: unless-stopped
    command: ["celery", "-A", "config", "beat", "-l", "info", "--schedule", "/tmp/celerybeat-schedule"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requis}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS requis}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS requis}
      DATABASE_URL: postgres://${POSTGRES_USER:-kexpress}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}@kexpress-db:5432/${POSTGRES_DB:-kexpress}
      REDIS_URL: redis://kexpress-redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      kexpress-db:
        condition: service_healthy
      kexpress-redis:
        condition: service_healthy
    networks:
      - kexpress-internal

  kexpress-broadcaster:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kexpress-broadcaster
    restart: unless-stopped
    command: ["python", "manage.py", "broadcast_tracking"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requis}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS requis}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS requis}
      DATABASE_URL: postgres://${POSTGRES_USER:-kexpress}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}@kexpress-db:5432/${POSTGRES_DB:-kexpress}
      REDIS_URL: redis://kexpress-redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      kexpress-db:
        condition: service_healthy
      kexpress-redis:
        condition: service_healthy
    networks:
      - kexpress-internal

  kexpress-backup:
    image: postgres:16-alpine
    container_name: kexpress-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: kexpress-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-kexpress}
      POSTGRES_USER: ${POSTGRES_USER:-kexpress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    entrypoint: ["sh", "/usr/local/bin/backup.sh"]
    volumes:
      - kexpress_backups:/backups
      - ./docker/backup.sh:/usr/local/bin/backup.sh:ro
      - ./docker/restore.sh:/usr/local/bin/restore.sh:ro
    depends_on:
      kexpress-db:
        condition: service_healthy
    networks:
      - kexpress-internal

  kexpress-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?NEXT_PUBLIC_API_BASE requis}
        NEXT_PUBLIC_OIDC_AUTHORITY: ${NEXT_PUBLIC_OIDC_AUTHORITY:-}
        NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID:-kexpress-web}
        NEXT_PUBLIC_LOCAL_LOGIN: ${NEXT_PUBLIC_LOCAL_LOGIN:-true}
    container_name: kexpress-frontend
    restart: unless-stopped
    depends_on:
      kexpress-backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - kexpress-internal
      - dokploy-network

volumes:
  kexpress_db:
  kexpress_redis:
  kexpress_media:
  kexpress_static:
  kexpress_backups:
  kexpress_osrm:  # graphe OSRM préparé (cache persistant inter-déploiements)

networks:
  kexpress-internal:
    name: kexpress-internal
    driver: bridge

  dokploy-network:
    external: true