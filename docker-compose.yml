# =============================================================================
# Kaydan Express — déploiement production (Docker Compose / Dokploy)
#
# Tous les services, réseaux et volumes sont préfixés « kexpress(-/_) » pour
# éviter toute collision avec d'autres piles déployées sur le même hôte.
#
# Services : kexpress-db (PostgreSQL 16) · kexpress-redis · kexpress-backend
#            (Daphne ASGI) · kexpress-worker (Celery) · kexpress-beat (Celery beat)
#            · kexpress-frontend (Next.js standalone).
#
# Déploiement Dokploy :
#   1. Créer une application « Compose » pointant sur ce dépôt.
#   2. Renseigner les variables d'environnement (cf. .env.production.example) dans
#      l'onglet « Environment » de Dokploy (elles alimentent les ${...} ci-dessous).
#   3. Ajouter deux domaines dans Dokploy :
#        - kexpress-frontend → port 3000   (ex. https://app.exemple.com)
#        - kexpress-backend  → port 8000   (ex. https://api.exemple.com)
#      Dokploy génère les labels Traefik et les certificats Let's Encrypt.
#   4. NEXT_PUBLIC_API_BASE doit valoir https://<domaine-backend>/api (figé au build).
#
# Le réseau externe « dokploy-network » est créé par Dokploy ; il permet à Traefik
# d'atteindre les conteneurs web. En dehors de Dokploy, créez-le une fois :
#   docker network create dokploy-network
# =============================================================================

name: kexpress

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requis}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS requis}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS requis}
  DATABASE_URL: postgres://${POSTGRES_USER:-kexpress}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}@kexpress-db:5432/${POSTGRES_DB:-kexpress}
  REDIS_URL: redis://kexpress-redis:6379/0
  # Web Push (VAPID)
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
  VAPID_ADMIN_EMAIL: ${VAPID_ADMIN_EMAIL:-admin@example.com}
  # Notifications email (SMTP)
  NOTIFY_EMAIL_ENABLED: ${NOTIFY_EMAIL_ENABLED:-False}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@kaydan-express.ci}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
  # K-BOT (LLM optionnel)
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  KBOT_MODEL: ${KBOT_MODEL:-claude-3-5-sonnet-latest}
  # Carte / routage & Fuel Intelligence
  OSRM_URL: ${OSRM_URL:-https://router.project-osrm.org}
  MAP_COST_PER_KM: ${MAP_COST_PER_KM:-350.0}
  FUEL_PRICE_SOURCE_URL: ${FUEL_PRICE_SOURCE_URL:-}
  FUEL_PRICE_SUPER: ${FUEL_PRICE_SUPER:-875}
  FUEL_PRICE_GASOIL: ${FUEL_PRICE_GASOIL:-655}
  REVISION_ALERT_PCTS: ${REVISION_ALERT_PCTS:-20,10,5}
  # Sécurité HTTP (le proxy Traefik gère TLS ; valeurs surchargeables)
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
  SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-2592000}
  SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-True}
  SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-True}
  CONN_MAX_AGE: ${CONN_MAX_AGE:-60}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  kexpress-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kexpress}
      POSTGRES_USER: ${POSTGRES_USER:-kexpress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
    volumes:
      - kexpress_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kexpress} -d ${POSTGRES_DB:-kexpress}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [kexpress-internal]

  kexpress-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - kexpress_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [kexpress-internal]

  kexpress-backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *django-env
      RUN_BOOTSTRAP: "true"          # migrations + collectstatic + rôles (web uniquement)
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
      SEED_DEMO: ${SEED_DEMO:-false}
    depends_on:
      kexpress-db:
        condition: service_healthy
      kexpress-redis:
        condition: service_healthy
    volumes:
      - kexpress_media:/app/media
      - kexpress_static:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks: [kexpress-internal, dokploy-network]
    # Routage : ajouter le domaine API dans l'UI Dokploy (service kexpress-backend, port 8000).
    # Hors Dokploy, décommenter les labels Traefik ci-dessous (adapter le domaine) :
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=dokploy-network"
    #   - "traefik.http.routers.kexpress-api.rule=Host(`api.exemple.com`)"
    #   - "traefik.http.routers.kexpress-api.entrypoints=websecure"
    #   - "traefik.http.routers.kexpress-api.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.kexpress-api.loadbalancer.server.port=8000"

  kexpress-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *django-env
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency", "${CELERY_CONCURRENCY:-4}"]
    depends_on:
      kexpress-db:
        condition: service_healthy
      kexpress-redis:
        condition: service_healthy
    volumes:
      - kexpress_media:/app/media
    networks: [kexpress-internal]

  kexpress-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *django-env
    command: ["celery", "-A", "config", "beat", "-l", "info", "--schedule", "/tmp/celerybeat-schedule"]
    depends_on:
      kexpress-db:
        condition: service_healthy
      kexpress-redis:
        condition: service_healthy
    networks: [kexpress-internal]

  kexpress-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?NEXT_PUBLIC_API_BASE requis (ex. https://api.exemple.com/api)}
    restart: unless-stopped
    depends_on:
      kexpress-backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [kexpress-internal, dokploy-network]
    # Routage : ajouter le domaine applicatif dans l'UI Dokploy (service kexpress-frontend, port 3000).
    # Hors Dokploy, décommenter les labels Traefik ci-dessous (adapter le domaine) :
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=dokploy-network"
    #   - "traefik.http.routers.kexpress-app.rule=Host(`app.exemple.com`)"
    #   - "traefik.http.routers.kexpress-app.entrypoints=websecure"
    #   - "traefik.http.routers.kexpress-app.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.kexpress-app.loadbalancer.server.port=3000"

volumes:
  kexpress_db:
  kexpress_redis:
  kexpress_media:
  kexpress_static:

networks:
  # Réseau privé inter-conteneurs (kexpress-db, kexpress-redis, app).
  kexpress-internal:
  # Réseau d'ingress géré par Dokploy/Traefik (créé hors de ce fichier).
  dokploy-network:
    external: true
